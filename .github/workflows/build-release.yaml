name: Build and release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build'
        required: true
      cutoff:
        description: 'Whether this is a cutoff release'
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    if: github.ref == 'refs/heads/master'
    name: Build
    uses: ./.github/workflows/build.yaml
    with:
      version: ${{ inputs.version }}

  release:
    if: github.ref == 'refs/heads/master'
    name: Release
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: /home/runner/artifacts

      - name: Create folders
        run: |
          mkdir /home/runner/releases

      - name: Generate version manifest
        run: |
          ./scripts/release.sh "${{ inputs.version }}" "${{ inputs.cutoff }}"


      - name: Archive Linux build
        run: |
          cd /home/runner/artifacts/cs2bhop-linux
          tar -czvf /home/runner/releases/cs2bhop-linux-v${{ inputs.version }}.tar.gz *

      - name: Archive Windows build
        run: |
          cd /home/runner/artifacts/cs2bhop-windows
          zip -r /home/runner/releases/cs2bhop-windows-v${{ inputs.version }}.zip *

      - name: Create GitHub Tag
        id: create_tag
        run: |
          git config --global user.email "${{ github.repository_owner_id }}+${{ github.repository_owner }}@users.noreply.github.com"
          git config --global user.name "${{ github.repository_owner }}"
          git tag -a v${{ inputs.version }} -m "Release v${{ inputs.version }}"
          git push origin v${{ inputs.version }}

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          files: |
            /home/runner/releases/cs2bhop-linux-v${{ inputs.version }}.tar.gz
            /home/runner/releases/cs2bhop-windows-v${{ inputs.version }}.zip
            /home/runner/releases/cs2bhop-version-v${{ inputs.version }}.json
          body: initial release
          prerelease: false
